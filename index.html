<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR 專業工具箱 - Lucydraw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 1. 環境變數補釘：防止某些套件因為找不到 process 而報錯 -->
  <script>
    window.process = { env: { NODE_ENV: 'production' } };
    
    // 2. 錯誤攔截器：如果發生白屏，直接把錯誤印在螢幕上
    window.onerror = function(msg, url, line, col, error) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div style="padding: 20px; color: #ef4444; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 8px; margin: 20px; font-family: monospace;">
            <h2 style="margin-top:0">⚠️ 網頁啟動失敗</h2>
            <p><strong>錯誤訊息:</strong> ${msg}</p>
            <p><strong>檔案位置:</strong> ${url} (第 ${line} 行)</p>
            <button onclick="location.reload()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 10px;">重新整理</button>
          </div>
        `;
      }
      return false;
    };
  </script>

  <!-- 3. 載入 Babel 編譯器 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { font-family: 'Inter', "Microsoft JhengHei", sans-serif; }
    .slot-animation { animation: slotRoll 0.1s linear infinite; }
    @keyframes slotRoll { 0% { transform: translateY(0); } 100% { transform: translateY(-10%); } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    /* 啟動動畫 */
    #loading-screen {
      position: fixed; inset: 0; background: white; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease;
    }
    .loader {
      width: 48px; height: 48px; border: 5px solid #e2e8f0; border-bottom-color: #4f46e5;
      border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite;
    }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <!-- 4. 強化版 Import Map -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@19.0.0",
    "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900">
  <!-- 載入中畫面 -->
  <div id="loading-screen">
    <span class="loader"></span>
    <p style="margin-top: 20px; color: #64748b; font-weight: 500;">HR 工具箱啟動中...</p>
  </div>

  <div id="root"></div>

  <!-- 5. 執行主程式 -->
  <script type="text/babel" data-type="module" data-presets="react,typescript" src="index.tsx"></script>

  <script>
    // 當 React 掛載完成後隱藏 Loading 畫面
    const observer = new MutationObserver((mutations) => {
      if (document.querySelector('#root > div')) {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
