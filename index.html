<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR 萬能抽籤分組大師 Pro</title>
    <!-- 引入外部資源 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
        }

        /* 深色模式變數 */
        body.dark-mode {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 24px 24px;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 50%;
        }

        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }
        body.dark-mode .tabs { background: #1e293b; border-color: #334155; }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 4px solid var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .content-section {
            display: none;
            padding: 32px;
            animation: slideUp 0.4s ease-out;
        }

        .content-section.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }
        body.dark-mode .card { background: #3341551a; border-color: #334155; }

        textarea {
            width: 100%;
            height: 150px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            box-sizing: border-box;
            background: transparent;
            color: inherit;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #64748b; }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        
        #lucky-display {
            height: 200px;
            background: #1e293b;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 800;
            color: #38bdf8;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
            border: 5px solid #334155;
        }

        .name-tag {
            display: inline-block;
            padding: 4px 10px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin: 4px;
            font-size: 0.85rem;
            color: #333;
        }

        .name-tag.duplicate { background: #fee2e2; border-color: #fecaca; color: #b91c1c; }

        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .group-card {
            background: #fff;
            border-top: 5px solid var(--primary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            color: #333;
        }

        .group-mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="light-mode">

<div class="app-container">
    <header>
        <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
        <h1><i class="fas fa-users-gear"></i> HR 抽籤分組大師 Pro</h1>
        <p>專業行政名單處理工具 • 已支援自動儲存與音效</p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-data')"><i class="fas fa-list-ul"></i> 名單設定</button>
        <button class="tab-btn" onclick="switchTab('tab-draw')"><i class="fas fa-gift"></i> 獎品抽籤</button>
        <button class="tab-btn" onclick="switchTab('tab-group')"><i class="fas fa-layer-group"></i> 自動分組</button>
    </nav>

    <!-- 名單來源 -->
    <section id="tab-data" class="content-section active">
        <div class="card">
            <h3><i class="fas fa-file-import"></i> 匯入名單</h3>
            <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-outline" onclick="loadMockData()">載入模擬名單</button>
                <button class="btn btn-outline" onclick="document.getElementById('csv-input').click()">上傳 CSV</button>
                <input type="file" id="csv-input" accept=".csv" style="display: none;" onchange="handleCSV(this)">
                <button id="clean-btn" class="btn btn-danger" style="display: none;" onclick="removeDuplicates()">移除重複</button>
            </div>
            <textarea id="name-input" placeholder="貼上姓名名單..." oninput="syncNames()"></textarea>
            <div id="stats" style="margin-top:10px;">
                人數：<span id="total-count">0</span> | 重複：<span id="dup-count" style="color:red">0</span>
            </div>
            <div id="name-preview" style="margin-top:15px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.03); padding: 10px; border-radius: 8px;"></div>
        </div>
    </section>

    <!-- 抽籤 -->
    <section id="tab-draw" class="content-section">
        <div class="card">
            <h3><i class="fas fa-trophy"></i> 抽籤大廳</h3>
            <div id="lucky-display">準備中</div>
            <div style="text-align: center;">
                <label style="margin-right: 20px;"><input type="checkbox" id="allow-repeat"> 允許重複抽取</label>
                <button class="btn btn-primary" onclick="startDraw()" style="padding: 15px 50px; font-size: 1.2rem;"><i class="fas fa-play"></i> 開始抽籤</button>
            </div>
            <div style="margin-top: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h4>中獎紀錄</h4>
                    <button class="btn btn-outline" onclick="downloadWinners()"><i class="fas fa-download"></i> 匯出中獎清單</button>
                </div>
                <div id="winner-history" style="background: rgba(0,0,0,0.03); min-height: 50px; padding: 15px; border-radius: 12px;">尚未有人中獎</div>
            </div>
        </div>
    </section>

    <!-- 分組 -->
    <section id="tab-group" class="content-section">
        <div class="card">
            <h3><i class="fas fa-dice"></i> 分組設定</h3>
            <div class="group-mode-toggle">
                模式：
                <label><input type="radio" name="g-mode" value="per" checked onclick="toggleGroupInput()"> 每組人數</label>
                <label><input type="radio" name="g-mode" value="total" onclick="toggleGroupInput()"> 分成幾組</label>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
                <span id="g-input-label">每組：</span>
                <input type="number" id="group-val" value="3" min="1" style="width: 70px; padding: 8px;">
                <button class="btn btn-primary" onclick="runGrouping()">隨機分組</button>
                <button class="btn btn-outline" onclick="downloadGroups()">匯出分組 CSV</button>
            </div>
            <div id="group-results" class="group-grid"></div>
        </div>
    </section>
</div>

<script>
    // 音效合成器 (使用 Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'tick') {
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    let nameList = [];
    let winners = [];
    let groupData = [];

    // 初始化：讀取上次的名單
    window.onload = () => {
        const saved = localStorage.getItem('hr_master_names');
        if (saved) {
            document.getElementById('name-input').value = saved;
            syncNames();
        }
    };

    function switchTab(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const icon = document.querySelector('.theme-toggle i');
        icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    function syncNames() {
        const text = document.getElementById('name-input').value;
        nameList = text.split(/[\n,，\s]+/).filter(n => n.trim() !== "");
        localStorage.setItem('hr_master_names', text); // 自動儲存
        renderPreview();
    }

    function renderPreview() {
        const preview = document.getElementById('name-preview');
        const totalSpan = document.getElementById('total-count');
        const dupSpan = document.getElementById('dup-count');
        const cleanBtn = document.getElementById('clean-btn');
        const seen = new Set();
        const dups = new Set();
        preview.innerHTML = "";

        nameList.forEach(n => {
            const span = document.createElement('span');
            span.className = 'name-tag';
            span.textContent = n;
            if (seen.has(n)) {
                span.classList.add('duplicate');
                dups.add(n);
            }
            seen.add(n);
            preview.appendChild(span);
        });
        totalSpan.textContent = nameList.length;
        dupSpan.textContent = dups.size;
        cleanBtn.style.display = dups.size > 0 ? 'inline-flex' : 'none';
    }

    function removeDuplicates() {
        nameList = [...new Set(nameList)];
        document.getElementById('name-input').value = nameList.join('\n');
        syncNames();
    }

    function loadMockData() {
        const mock = ["王小明", "李曉華", "張大春", "陳阿美", "林書豪", "王小明", "周杰倫", "蔡依林", "陳大文", "林志玲", "彭于晏", "金城武"];
        document.getElementById('name-input').value = mock.join('\n');
        syncNames();
    }

    function handleCSV(input) {
        Papa.parse(input.files[0], {
            complete: (r) => {
                const names = r.data.flat().filter(n => n.trim() !== "");
                document.getElementById('name-input').value = names.join('\n');
                syncNames();
            }
        });
    }

    // 抽籤邏輯
    let drawing = false;
    function startDraw() {
        if (drawing || nameList.length === 0) return;
        drawing = true;
        const display = document.getElementById('lucky-display');
        const repeat = document.getElementById('allow-repeat').checked;
        let count = 0;
        
        const timer = setInterval(() => {
            display.textContent = nameList[Math.floor(Math.random() * nameList.length)];
            playSound('tick');
            count++;
            if (count > 25) {
                clearInterval(timer);
                const winnerIdx = Math.floor(Math.random() * nameList.length);
                const winner = nameList[winnerIdx];
                display.textContent = winner;
                winners.push(winner);
                updateWinners();
                playSound('win');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

                if (!repeat) {
                    nameList.splice(winnerIdx, 1);
                    document.getElementById('name-input').value = nameList.join('\n');
                    syncNames();
                }
                drawing = false;
            }
        }, 60);
    }

    function updateWinners() {
        document.getElementById('winner-history').innerHTML = winners.map((w, i) => `<span class="name-tag">#${i+1} ${w}</span>`).reverse().join('');
    }

    function downloadWinners() {
        const csv = "\ufeff順序,中獎者\n" + winners.map((w, i) => `${i+1},${w}`).join('\n');
        downloadFile(csv, "中獎名單.csv");
    }

    // 分組邏輯
    function toggleGroupInput() {
        const mode = document.querySelector('input[name="g-mode"]:checked').value;
        document.getElementById('g-input-label').textContent = mode === 'per' ? '每組幾人：' : '分成幾組：';
    }

    function runGrouping() {
        if (nameList.length === 0) return;
        const val = parseInt(document.getElementById('group-val').value);
        const mode = document.querySelector('input[name="g-mode"]:checked').value;
        const shuffled = [...nameList].sort(() => Math.random() - 0.5);
        groupData = [];

        if (mode === 'per') {
            for (let i = 0; i < shuffled.length; i += val) groupData.push(shuffled.slice(i, i + val));
        } else {
            for (let i = 0; i < val; i++) groupData[i] = [];
            shuffled.forEach((name, i) => groupData[i % val].push(name));
        }
        renderGroups();
    }

    function renderGroups() {
        const container = document.getElementById('group-results');
        container.innerHTML = "";
        groupData.forEach((g, i) => {
            const card = document.createElement('div');
            card.className = 'group-card';
            card.innerHTML = `<h4>第 ${i+1} 組 (${g.length}人)</h4>${g.join('、')}`;
            container.appendChild(card);
        });
    }

    function downloadGroups() {
        const csv = "\ufeff組別,成員\n" + groupData.map((g, i) => `第${i+1}組,"${g.join(',')}"`).join('\n');
        downloadFile(csv, "分組結果.csv");
    }

    function downloadFile(content, filename) {
        const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
    }
</script>

</body>
</html>
